app = "itadoritrue"
primary_region = "gru"

[build]
dockerfile = "Dockerfile"

[env]
NODE_ENV = "production"
PORT = "8080"
DATA_DIR = "/data"

[http_service]
internal_port = 8080
force_https = true
auto_start_machines = true
auto_stop_machines = "stop"
min_machines_running = 0
processes = ["app"]

[[mounts]]
source = "data"
destination = "/data"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
